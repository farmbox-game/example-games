<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ever-Farm: Expansion & Irrigation</title>
    <style>
        :root { --grass: #2e7d32; --dirt: #5d4037; --pasture: #9ccc65; --water: #2196f3; --night: rgba(0,0,50,0.6); }
        body { background: #1a1a1a; color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; margin: 0; }
        #game-wrapper { position: relative; margin-top: 20px; border: 10px solid #3e2723; }
        #grid { display: grid; grid-template-columns: repeat(12, 50px); grid-template-rows: repeat(12, 50px); background: var(--grass); }
        .tile { width: 50px; height: 50px; border: 0.1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 22px; position: relative; }
        .player { position: absolute; width: 50px; height: 50px; z-index: 10; display: flex; align-items: center; justify-content: center; font-size: 30px; transition: 0.1s; pointer-events: none; }
        #night-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: var(--night); pointer-events: none; opacity: 0; transition: opacity 2s; z-index: 20; }
        .ui-panel { width: 620px; background: #333; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border: 2px solid #555; }
        .stats-bar { width: 620px; background: #444; padding: 10px; display: flex; justify-content: space-between; font-weight: bold; border-bottom: 4px solid gold; }
        .btn { background: #5d4037; color: white; border: 1px solid #795548; padding: 8px; cursor: pointer; margin: 2px; font-size: 12px; }
        .btn:hover { background: #795548; }
        .trader-window { position: absolute; top: 50px; left: 50px; width: 500px; background: #5d4037; border: 4px solid gold; z-index: 100; display: none; padding: 20px; box-shadow: 0 0 50px black; }
    </style>
</head>
<body>

<div class="stats-bar">
    <div>Day <span id="day-val">1</span> (<span id="season-val">Spring</span>)</div>
    <div>💰 $<span id="money-val">50</span> | 🥈<span id="silver-val">0</span> | 🥇<span id="gold-val">0</span></div>
</div>

<div id="game-wrapper">
    <div id="grid"></div>
    <div id="player" class="player">👩‍🌾</div>
    <div id="night-overlay"></div>

    <div id="trader-menu" class="trader-window">
        <h2>The Trader 🚛 <span style="font-size: 14px; float: right;">Rep: <span id="rep-val">50</span></span></h2>
        <div id="trader-items"></div>
        <hr>
        <button class="btn" onclick="closeTrader()">Close</button>
    </div>
</div>

<div class="ui-panel">
    <div>
        <strong>Inventory & Infrastructure</strong><br>
        Seeds: <span id="seed-val">5</span> | Fodder: <span id="fod-val">10</span><br>
        Silos: <span id="silo-val">0</span> | Irrigation: <span id="irrig-val">Off</span>
        <div style="margin-top:10px;">
            <button class="btn" onclick="setInteractionMode('till')">Tool: Hoe (Till)</button>
            <button class="btn" onclick="setInteractionMode('pasture')">Tool: Fence (Pasture)</button>
            <button class="btn" onclick="setInteractionMode('water')">Tool: Watering Can</button>
        </div>
    </div>
    <div style="background:#222; padding:5px;">
        <strong>Tasks:</strong>
        <div id="tasks" style="font-size:12px; color: #ffeb3b;"></div>
        <button class="btn" id="sleep-btn" onclick="trySleep()" style="display:none; width:100%; background:navy;">SLEEP (Z)</button>
    </div>
</div>

<script>
let gameState = {
    day: 1, season: 'Spring', money: 100, silver: 0, gold: 0,
    seeds: 5, silos: 0, fodder: 10, rep: 50, 
    isNight: false, timeSec: 0, hasCoat: false,
    interactionMode: 'water', hasIrrigation: false
};

let player = { x: 1, y: 1 };
let grid = [];
let animals = [];

function init() {
    const gridEl = document.getElementById('grid');
    for(let y=0; y<GRID_SIZE=12; y++) {
        for(let x=0; x<12; x++) {
            let type = 'grass';
            if(x==0 && y==0) type = 'house';
            let tile = { x, y, type, crop: null, age: 0, watered: false };
            grid.push(tile);
            let div = document.createElement('div');
            div.id = `t-${x}-${y}`;
            div.className = 'tile';
            gridEl.appendChild(div);
            renderTile(tile);
        }
    }
    spawnAnimal('sheep', 10, 10);
    updateUI();
    setInterval(tick, 1000);
}

function renderTile(tile) {
    const el = document.getElementById(`t-${tile.x}-${tile.y}`);
    let bgColor = 'var(--grass)';
    if(tile.type === 'house') bgColor = '#795548';
    if(tile.type === 'tilled') bgColor = tile.watered ? '#3e2723' : '#5d4037';
    if(tile.type === 'pasture') bgColor = 'var(--pasture)';
    if(tile.hasSilo) bgColor = '#9e9e9e';
    
    el.style.background = bgColor;
    if(tile.watered && !tile.hasSilo && tile.type !== 'house') el.style.boxShadow = "inset 0 0 10px #2196f3";
    else el.style.boxShadow = "none";

    let emoji = '';
    if(tile.type === 'house') emoji = '🏠';
    if(tile.hasSilo) emoji = '🛖';
    if(tile.crop) {
        if(tile.age < 1) emoji = '🌱';
        else if(tile.age < 2) emoji = '🌿';
        else if(tile.age >= 2 && tile.age <= 4) emoji = (gameState.season === 'Fall' ? '🎃' : '🌾');
        else emoji = '🍂';
    }
    let anim = animals.find(a => a.x === tile.x && a.y === tile.y);
    if(anim) emoji = anim.type === 'sheep' ? '🐑' : '🐄';
    
    el.innerText = emoji;
}

function setInteractionMode(m) { gameState.interactionMode = m; }

function interact() {
    let tile = grid.find(t => t.x === player.x && t.y === player.y);
    
    // Tilling Logic
    if(gameState.interactionMode === 'till' && tile.type === 'grass') {
        tile.type = 'tilled';
    } 
    // Pasture Logic
    else if(gameState.interactionMode === 'pasture' && tile.type === 'grass') {
        tile.type = 'pasture';
    }
    // Planting
    else if(tile.type === 'tilled' && !tile.crop && gameState.seeds > 0) {
        tile.crop = 'wheat'; tile.age = 0; gameState.seeds--;
    }
    // Watering
    else if(tile.type === 'tilled' && gameState.interactionMode === 'water') {
        tile.watered = true;
    }
    // Harvesting
    else if(tile.crop && tile.age >= 2) {
        if(tile.age <= 4) {
            let gain = (gameState.season === 'Fall' ? 40 : 25);
            gameState.money += gain;
            gameState.fodder += 2; // Keep some for animals
        }
        tile.crop = null;
        tile.watered = false;
    }
    // Feed Animal Manually
    let anim = animals.find(a => a.x === player.x && a.y === player.y);
    if(anim && gameState.fodder > 0) {
        gameState.fodder--;
        gameState.money += 5; // Reward for manual care
    }

    if(tile.type === 'house' && traderIsHere()) openTrader();
    
    renderTile(tile);
    updateUI();
}

function tick() {
    if(!gameState.isNight) {
        gameState.timeSec++;
        if(gameState.timeSec >= 600) {
            gameState.isNight = true;
            document.getElementById('night-overlay').style.opacity = 1;
            document.getElementById('sleep-btn').style.display = 'block';
        }
        if(gameState.timeSec % 8 === 0) moveAnimals();
    }
}

function moveAnimals() {
    animals.forEach(a => {
        let directions = [{x:0, y:1}, {x:0, y:-1}, {x:1, y:0}, {x:-1, y:0}];
        let move = directions[Math.floor(Math.random()*4)];
        let newX = a.x + move.x;
        let newY = a.y + move.y;
        
        let targetTile = grid.find(t => t.x === newX && t.y === newY);
        // Animals stay in pastures if they are in one, or roam grass
        if(targetTile && (targetTile.type === 'pasture' || targetTile.type === 'grass')) {
            a.x = newX; a.y = newY;
        }
    });
    grid.forEach(t => renderTile(t));
}

function trySleep() {
    if(player.x === 0 && player.y === 0) nextDay();
}

function nextDay() {
    gameState.day++;
    gameState.isNight = false;
    gameState.timeSec = 0;
    document.getElementById('night-overlay').style.opacity = 0;
    document.getElementById('sleep-btn').style.display = 'none';

    const seasons = ['Spring', 'Summer', 'Fall', 'Winter'];
    gameState.season = seasons[Math.floor((gameState.day-1)/10) % 4];

    // Silo & Irrigation Automation
    grid.forEach(t => {
        if(gameState.hasIrrigation && t.type === 'tilled') t.watered = true;
        if(t.crop) {
            if(t.watered) t.age++;
            else if(gameState.season !== 'Summer') t.age += 0.5;
            if(gameState.season === 'Summer' && !t.watered) t.age = Math.max(0, t.age - 0.5); // Summer heat wilts
            t.watered = false;
        }
        renderTile(t);
    });

    // Animal Automatic Feeding via Silo
    animals.forEach(a => {
        let foodNeed = (gameState.season === 'Winter' ? 3 : 1);
        if(gameState.fodder >= foodNeed) {
            gameState.fodder -= foodNeed;
        } else {
            gameState.money -= 10; // Penalty for starving animals
        }
    });

    // Prestige Math
    if(gameState.money >= 1000) { gameState.money -= 1000; gameState.silver++; }
    if(gameState.silver >= 10) { gameState.silver -= 10; gameState.gold++; }

    updateUI();
}

function traderIsHere() { return (gameState.day >= 4 && (gameState.day-4) % 3 === 0); }

function openTrader() {
    const menu = document.getElementById('trader-menu');
    const container = document.getElementById('trader-items');
    menu.style.display = 'block';
    
    let buyMod = (50 / gameState.rep);
    let sellMod = (gameState.rep / 50);

    container.innerHTML = `
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div>
                <h4>Buy</h4>
                <button class="btn" onclick="buy('seeds', 10, ${buyMod})">Seeds ($${Math.ceil(10*buyMod)})</button>
                <button class="btn" onclick="buy('fodder', 5, ${buyMod})">Fodder ($${Math.ceil(5*buyMod)})</button>
                <button class="btn" onclick="buy('silo', 500, 1)">Build Silo ($500)</button>
                <button class="btn" onclick="buy('irrigation', 800, 1)">Irrigation ($800)</button>
            </div>
            <div>
                <h4>Reputation Trade</h4>
                <button class="btn" onclick="adjustRep(5, 50)">Donate $50 (+Rep)</button>
                <button class="btn" onclick="adjustRep(-10, -20)">Take $20 (-Rep)</button>
            </div>
        </div>
    `;
}

function buy(item, basePrice, mod) {
    let finalPrice = Math.ceil(basePrice * mod);
    if(gameState.money >= finalPrice) {
        gameState.money -= finalPrice;
        if(item === 'seeds') gameState.seeds += 5;
        if(item === 'fodder') gameState.fodder += 10;
        if(item === 'silo') {
            gameState.silos++;
            let t = grid.find(tile => tile.type === 'grass' && tile.x > 0);
            t.hasSilo = true; t.type = 'structure';
        }
        if(item === 'irrigation') gameState.hasIrrigation = true;
        updateUI();
        openTrader();
    }
}

function adjustRep(amt, cost) {
    if(cost > 0 && gameState.money < cost) return;
    gameState.money -= cost;
    gameState.rep = Math.min(100, Math.max(0, gameState.rep + amt));
    updateUI();
    openTrader();
}

function closeTrader() { document.getElementById('trader-menu').style.display = 'none'; }

window.addEventListener('keydown', e => {
    if(e.key === 'ArrowUp' && player.y > 0) player.y--;
    if(e.key === 'ArrowDown' && player.y < 11) player.y++;
    if(e.key === 'ArrowLeft' && player.x > 0) player.x--;
    if(e.key === 'ArrowRight' && player.x < 11) player.x++;
    if(e.key.toLowerCase() === 'e') interact();
    if(e.key.toLowerCase() === 'z') trySleep();
    updatePlayer();
});

function updatePlayer() {
    const p = document.getElementById('player');
    p.style.left = player.x * 50 + 'px';
    p.style.top = player.y * 50 + 'px';
}

function spawnAnimal(type, x, y) { animals
